name: 🛠️ Build Docker Image

# ========================================
# 触发条件：
# - main 分支推送 → latest 标签
# - develop 分支推送 → develop 标签  
# - tag 推送 (v*) → 对应版本标签
# ========================================
on:
  push:
    branches: [main, develop]
    tags: ['v*']

env:
  PROJECT_NAME: portal-chuan-dai-h5
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: ray321
  K8S_NAMESPACE: default
  IMAGE_PULL_SECRET_NAME: tencent-tcr-secret

jobs:
  build:
    name: 🛠️ Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      # 根据分支/tag 生成镜像标签
      - name: Generate image tag
        id: meta
        run: |
          IMAGE_NAME=${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.PROJECT_NAME }}
          
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # tag 推送: v1.0.0 → 1.0.0
            IMAGE_TAG=${GITHUB_REF#refs/tags/v}
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            # main 分支 → latest
            IMAGE_TAG=latest
          elif [[ "$GITHUB_REF" == refs/heads/develop ]]; then
            # develop 分支 → develop
            IMAGE_TAG=develop
          else
            # 其他分支 → 分支名
            IMAGE_TAG=${GITHUB_REF#refs/heads/}
          fi
          
          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "🏷️ 镜像: $IMAGE_NAME:$IMAGE_TAG"

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          build-args: |
            DATABASE_URL=${{ secrets.SUPABASE_POSTGRES_DATABASE_URL }}
            DIRECT_URL=${{ secrets.SUPABASE_POSTGRES_DIRECT_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "✅ 镜像构建完成"
          echo "📦 ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"

      # 自动部署到 K8s（仅 main 分支）
      - name: Deploy to K8s
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

          kubectl create secret docker-registry "${{ env.IMAGE_PULL_SECRET_NAME }}" \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --docker-server="${{ env.TCR_REGISTRY }}" \
            --docker-username="${{ secrets.TCR_USERNAME }}" \
            --docker-password="${{ secrets.TCR_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          sed -i "s|__IMAGE_NAME__|${{ steps.meta.outputs.image }}|g" deployment.yaml
          sed -i "s|__IMAGE_TAG__|${{ steps.meta.outputs.tag }}|g" deployment.yaml
          
          kubectl apply -n "${{ env.K8S_NAMESPACE }}" -f deployment.yaml
          kubectl rollout restart -n "${{ env.K8S_NAMESPACE }}" deployment/${{ env.PROJECT_NAME }}-deployment
          kubectl rollout status -n "${{ env.K8S_NAMESPACE }}" deployment/${{ env.PROJECT_NAME }}-deployment --timeout=120s
          echo "✅ 部署完成"
