name: Supabase KeepAlive

on:
  schedule:
    # 每天北京时间 10:00 自动访问（UTC 02:00）
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Validate Supabase config
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_ANON_KEY GitHub secret."
            exit 1
          fi

      - name: Wake up Supabase
        run: |
          http_code=$(curl --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 30 \
            -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/")

          echo "Supabase keepalive HTTP status: $http_code"

          if [ "$http_code" = "000" ]; then
            echo "::error::Failed to connect to $SUPABASE_URL. Check the project URL, DNS resolution, or project status."
            exit 1
          fi
