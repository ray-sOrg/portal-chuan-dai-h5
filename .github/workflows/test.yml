name: ✅ Automated Tests

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  test:
    name: Lint, unit, and E2E
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.SUPABASE_POSTGRES_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.SUPABASE_POSTGRES_DIRECT_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit

      - name: Lint test files
        run: bun run lint:tests

      - name: Unit tests
        run: bun run test:unit

      - name: E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
